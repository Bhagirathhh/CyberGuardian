<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Guardian | Hash Generator</title>
<style>
:root{
  --bg1:#020617; --bg2:#0f172a; --bg3:#1e293b;
  --glass:rgba(255,255,255,0.08); --glass-border:rgba(255,255,255,0.12);
  --text:#e2e8f0; --muted:#94a3b8; --cyan:#06b6d4; --blue:#3b82f6; --green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html{height:100%;overflow-x:hidden;}
body{
  min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;
  padding:40px 16px;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  overflow-y:auto;overflow-x:hidden;color:var(--text);position:relative;
}
body::before{
  content:'';position:fixed;inset:-50%;
  background:linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:40px 40px;transform:rotate(12deg);animation:gridMove 28s linear infinite;pointer-events:none;z-index:0;
}
@keyframes gridMove{from{transform:translate3d(0,0,0) rotate(12deg);}to{transform:translate3d(-120px,-120px,0) rotate(12deg);}}
.card{
  position:relative;width:min(820px, calc(100vw - 32px));padding:36px;border-radius:28px;
  background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--glass-border);
  box-shadow:0 20px 60px rgba(0,0,0,.45), 0 0 30px rgba(6,182,212,.15);z-index:1;
  animation:fadeIn .9s ease both;margin:0 auto;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(22px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.back-btn{text-decoration:none;color:var(--text);background:rgba(255,255,255,0.08);padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);transition:.25s ease;display:inline-block;margin-bottom:18px;}
.back-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);}
.header{text-align:center;margin-bottom:22px;}
.logo{font-size:56px;filter:drop-shadow(0 0 12px rgba(6,182,212,.25));}
h1{margin-top:8px;font-size:34px;}
.subtitle{color:var(--muted);margin-top:10px;line-height:1.5;}
.section{margin-top:20px;padding:20px;border-radius:18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);}
.section h3{margin-bottom:12px;font-size:19px;}
form{display:flex;flex-direction:column;gap:14px;}
textarea, select{
  width:100%;padding:15px 16px;border:1px solid rgba(255,255,255,0.10);outline:none;border-radius:14px;
  background:rgba(255,255,255,0.06);color:var(--text);font-size:16px;transition:.25s ease;
}
textarea{min-height:140px;resize:vertical;}
textarea:focus, select:focus{border-color:rgba(6,182,212,.6);box-shadow:0 0 0 4px rgba(6,182,212,.12);}
button{
  width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;font-size:16px;font-weight:700;
  background:linear-gradient(90deg,var(--cyan),var(--blue));color:white;transition:.25s ease;
}
button:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(59,130,246,.30);}
.hash-box{
  margin-top:18px;padding:18px;border-radius:18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
}
.hash-label{color:var(--muted);font-size:13px;margin-bottom:8px;}
.hash-value{font-size:15px;word-break:break-all;color:#a5f3fc;line-height:1.6;}
.footer{margin-top:22px;text-align:center;color:var(--muted);font-size:13px;}
@media (max-width: 640px){.card{padding:24px;border-radius:22px;}.h1{font-size:27px;}.logo{font-size:46px;}}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back-btn">⬅ Dashboard</a>
  <div class="header">
    <div class="logo">#</div>
    <h1>Hash Generator</h1>
    <p class="subtitle">Generate cryptographic hashes for text verification and integrity workflows.</p>
  </div>

  <form method="POST">
    <div class="section">
      <h3>Input Text</h3>
      <textarea name="text" placeholder="Enter text to hash..." required></textarea>
    </div>

    <div class="section">
      <h3>Algorithm</h3>
      <select name="algo">
        <option value="sha256">SHA-256</option>
        <option value="sha1">SHA-1</option>
        <option value="md5">MD5</option>
        <option value="sha512">SHA-512</option>
      </select>
    </div>

    <button type="submit">⚡ Generate Hash</button>
  </form>

  {% if result %}
  <div class="hash-box">
    <div class="hash-label">Generated Hash</div>
    <div class="hash-value">{{ result }}</div>
  </div>
  {% endif %}

  <div class="footer">Cyber Guardian Security Suite © 2026</div>
</div>
</body>
</html>
