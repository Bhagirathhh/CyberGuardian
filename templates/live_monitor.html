<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Guardian | Live Monitor</title>
<style>
:root{
  --bg1:#020617; --bg2:#0f172a; --bg3:#1e293b;
  --glass:rgba(255,255,255,0.08); --glass-border:rgba(255,255,255,0.12);
  --text:#e2e8f0; --muted:#94a3b8; --cyan:#06b6d4; --blue:#3b82f6; --green:#22c55e; --amber:#f59e0b; --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html{height:100%;overflow-x:hidden;}
body{
  min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;padding:40px 16px;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));overflow-y:auto;overflow-x:hidden;color:var(--text);position:relative;
}
body::before{
  content:'';position:fixed;inset:-50%;
  background:linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:40px 40px;transform:rotate(12deg);animation:gridMove 28s linear infinite;pointer-events:none;z-index:0;
}
@keyframes gridMove{from{transform:translate3d(0,0,0) rotate(12deg);}to{transform:translate3d(-120px,-120px,0) rotate(12deg);}}
.card{
  position:relative;width:min(980px, calc(100vw - 32px));padding:36px;border-radius:28px;background:var(--glass);
  backdrop-filter:blur(18px);border:1px solid var(--glass-border);box-shadow:0 20px 60px rgba(0,0,0,.45), 0 0 30px rgba(6,182,212,.15);
  z-index:1;animation:fadeIn .9s ease both;margin:0 auto;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(22px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.back-btn{text-decoration:none;color:var(--text);background:rgba(255,255,255,0.08);padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);transition:.25s ease;display:inline-block;margin-bottom:18px;}
.back-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px);}
.header{text-align:center;margin-bottom:24px;}
.logo{font-size:56px;filter:drop-shadow(0 0 12px rgba(6,182,212,.25));}
h1{margin-top:8px;font-size:34px;}
.subtitle{color:var(--muted);margin-top:10px;line-height:1.5;}
.overview{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:20px;
}
.mini{
  padding:18px;border-radius:18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);
}
.label{color:var(--muted);font-size:13px;margin-bottom:8px;}
.value{font-size:28px;font-weight:800;}
.charts{
  margin-top:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;
}
.chart-card{
  padding:20px;border-radius:18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);
}
.chart-title{margin-bottom:12px;font-size:18px;}
.bar{
  width:100%;height:14px;border-radius:999px;background:#0f172a;overflow:hidden;border:1px solid rgba(255,255,255,.06);margin-top:8px;
}
.fill{
  height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--cyan),var(--blue));transition:width .4s ease;
}
.meter{
  font-size:15px;color:#cbd5e1;display:flex;justify-content:space-between;gap:10px;
}
.footer{margin-top:22px;text-align:center;color:var(--muted);font-size:13px;}
@media (max-width: 640px){.card{padding:24px;border-radius:22px;}.logo{font-size:46px;}.h1{font-size:27px;}}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back-btn">⬅ Dashboard</a>
  <div class="header">
    <div class="logo">📡</div>
    <h1>Live Resource Monitor</h1>
    <p class="subtitle">Real-time CPU, RAM, and disk tracking without refreshing the page.</p>
  </div>

  <div class="overview">
    <div class="mini"><div class="label">CPU</div><div class="value" id="cpuValue">0%</div></div>
    <div class="mini"><div class="label">RAM</div><div class="value" id="ramValue">0%</div></div>
    <div class="mini"><div class="label">Disk</div><div class="value" id="diskValue">0%</div></div>
    <div class="mini"><div class="label">Last Update</div><div class="value" id="timeValue">--:--:--</div></div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <div class="chart-title">CPU Usage</div>
      <div class="meter"><span>Load</span><span id="cpuText">0%</span></div>
      <div class="bar"><div class="fill" id="cpuBar"></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">RAM Usage</div>
      <div class="meter"><span>Memory</span><span id="ramText">0%</span></div>
      <div class="bar"><div class="fill" id="ramBar"></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Disk Usage</div>
      <div class="meter"><span>Storage</span><span id="diskText">0%</span></div>
      <div class="bar"><div class="fill" id="diskBar"></div></div>
    </div>
  </div>

  <div class="footer">Cyber Guardian Security Suite © 2026</div>
</div>

<script>
const evt = new EventSource("/stream");
evt.onmessage = (e) => {
  const d = JSON.parse(e.data);
  const cpu = Math.round(d.cpu);
  const ram = Math.round(d.ram);
  const disk = Math.round(d.disk);

  document.getElementById("cpuValue").textContent = cpu + "%";
  document.getElementById("ramValue").textContent = ram + "%";
  document.getElementById("diskValue").textContent = disk + "%";
  document.getElementById("timeValue").textContent = d.time;

  document.getElementById("cpuText").textContent = cpu + "%";
  document.getElementById("ramText").textContent = ram + "%";
  document.getElementById("diskText").textContent = disk + "%";

  document.getElementById("cpuBar").style.width = cpu + "%";
  document.getElementById("ramBar").style.width = ram + "%";
  document.getElementById("diskBar").style.width = disk + "%";
};
</script>
</body>
</html>
